<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>五子棋 · 深色极简</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0b1a2e, #0d1117);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    .game-wrapper {
      background: #141b24;
      padding: 1.8rem 2rem 2rem;
      border-radius: 3rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 0 1px rgba(255,255,255,0.06);
      backdrop-filter: blur(2px);
    }
    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }
    /* 棋盘容器 — 木质质感通过 canvas 背景实现 */
    .board-wrapper {
      position: relative;
      border-radius: 28px;
      box-shadow: inset 0 0 0 1px #2f3b48, 0 12px 28px rgba(0,0,0,0.7);
      background: #3b2f24;  /* 深木色底 */
      padding: 12px;
    }
    canvas {
      display: block;
      width: 540px;
      height: 540px;
      border-radius: 20px;
      background: #c8a77b;  /* 暖木色基底，canvas绘制叠加木纹 */
      box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
      cursor: pointer;
      transition: filter 0.2s;
    }
    canvas:active {
      filter: brightness(0.96);
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      color: #d6dee7;
      font-weight: 400;
      letter-spacing: 0.3px;
      padding: 0 6px;
    }
    .turn-indicator {
      background: #1f2a35;
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      font-size: 1rem;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.6), 0 2px 4px rgba(0,0,0,0.3);
      border: 1px solid #3f4e5e;
      backdrop-filter: blur(4px);
    }
    .turn-indicator span {
      font-weight: 600;
      color: #f2e9d0;
    }
    .turn-indicator .black-turn { color: #1f1a15; text-shadow: 0 0 4px #b9a186; }
    .turn-indicator .white-turn { color: #f5f0e6; text-shadow: 0 0 6px #b1c6d9; }
    .btn-group {
      display: flex;
      gap: 0.8rem;
    }
    .btn {
      background: #1f2b36;
      border: none;
      color: #d6e0ea;
      font-size: 0.9rem;
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      font-weight: 500;
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.05), 0 4px 8px rgba(0,0,0,0.5);
      border: 1px solid #31404e;
      cursor: pointer;
      transition: all 0.15s;
      backdrop-filter: blur(4px);
      letter-spacing: 0.5px;
    }
    .btn:hover {
      background: #2c3b4a;
      border-color: #5c7288;
      color: #f0f6ff;
      transform: scale(1.02);
      box-shadow: 0 6px 12px rgba(0,0,0,0.6);
    }
    .btn:active {
      transform: scale(0.96);
      background: #17222b;
    }
    /* 获胜模态框 — 美观深色玻璃 */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(8, 14, 22, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      justify-content: center;
      align-items: center;
      z-index: 999;
      animation: fadeIn 0.25s ease;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal-card {
      background: #1a2532;
      padding: 2.5rem 3rem;
      border-radius: 3rem;
      text-align: center;
      box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 1px 0 #4b627a;
      border: 1px solid #3d5369;
      max-width: 380px;
      animation: scaleUp 0.25s ease;
    }
    .modal-card h2 {
      font-size: 2.2rem;
      font-weight: 500;
      color: #f2e9d0;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 10px rgba(210, 180, 140, 0.3);
    }
    .modal-card .winner-icon {
      font-size: 3.4rem;
      margin: 0.2rem 0 0.2rem;
    }
    .modal-card p {
      color: #b6c9db;
      font-size: 1.1rem;
      margin: 0.4rem 0 1.8rem;
      opacity: 0.9;
    }
    .modal-btn {
      background: #2b3e52;
      border: 1px solid #5f7b97;
      color: #f0f4fa;
      padding: 0.6rem 2.2rem;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.15s;
      box-shadow: 0 6px 12px rgba(0,0,0,0.4);
    }
    .modal-btn:hover {
      background: #3b5470;
      border-color: #8aa9c9;
      transform: scale(1.02);
      color: white;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes scaleUp {
      from { transform: scale(0.92); opacity: 0.6; }
      to { transform: scale(1); opacity: 1; }
    }
    .footer-note {
      color: #5c6f82;
      font-size: 0.7rem;
      letter-spacing: 1px;
      margin-top: 4px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
<div class="game-wrapper">
  <div class="game-container">
    <div class="board-wrapper">
      <canvas id="gobanCanvas" width="540" height="540"></canvas>
    </div>
    <div class="status-bar">
      <div class="turn-indicator" id="turnIndicator">⚫ <span class="black-turn">黑棋</span> 落子</div>
      <div class="btn-group">
        <button class="btn" id="undoBtn">↩ 悔棋</button>
        <button class="btn" id="resetBtn">⟳ 重开</button>
      </div>
    </div>
    <div class="footer-note">双人 · 极简五子棋</div>
  </div>
</div>

<!-- 获胜模态框 -->
<div class="modal-overlay" id="winModal">
  <div class="modal-card">
    <div class="winner-icon" id="winnerIcon">⚫</div>
    <h2 id="winnerTitle">黑胜</h2>
    <p id="winnerSub">五子连珠 · 精彩对局</p>
    <button class="modal-btn" id="modalRestartBtn">🔄 再来一局</button>
  </div>
</div>

<script>
  (function() {
    const canvas = document.getElementById('gobanCanvas');
    const ctx = canvas.getContext('2d');
    const turnIndicator = document.getElementById('turnIndicator');
    const undoBtn = document.getElementById('undoBtn');
    const resetBtn = document.getElementById('resetBtn');
    const winModal = document.getElementById('winModal');
    const winnerIcon = document.getElementById('winnerIcon');
    const winnerTitle = document.getElementById('winnerTitle');
    const winnerSub = document.getElementById('winnerSub');
    const modalRestartBtn = document.getElementById('modalRestartBtn');

    // 棋盘配置
    const BOARD_SIZE = 15;          // 15x15 标准五子棋
    const CELL_SIZE = canvas.width / BOARD_SIZE;  // 36px
    const RADIUS = CELL_SIZE * 0.42; // 棋子半径 ≈15px
    const OFFSET = CELL_SIZE / 2;

    // 游戏状态
    let board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(null));
    let currentPlayer = 'black'; // 'black' 或 'white'
    let gameOver = false;
    let moveHistory = [];        // 存储 { row, col, player }

    // 绘制函数 (木质背景 + 网格 + 棋子)
    function drawBoard() {
      // 1. 木质基底 (模仿木纹)
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // 木色渐变 + 杂色纹理
      const woodGrad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      woodGrad.addColorStop(0, '#b58a5b');
      woodGrad.addColorStop(0.3, '#c6a072');
      woodGrad.addColorStop(0.6, '#a57a4b');
      woodGrad.addColorStop(1, '#8f6a40');
      ctx.fillStyle = woodGrad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 木纹细线 (随机但可重复)
      ctx.save();
      ctx.globalAlpha = 0.15;
      for (let i = 0; i < 60; i++) {
        const x = (i * 23) % canvas.width;
        const y = (i * 13) % canvas.height;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + 40 + i * 2, y + 18);
        ctx.strokeStyle = '#3d2b1a';
        ctx.lineWidth = 1.2 + (i % 3);
        ctx.stroke();
      }
      ctx.restore();

      // 2. 绘制网格 (高对比度银灰)
      ctx.strokeStyle = '#3a4b5a';
      ctx.lineWidth = 1.6;
      ctx.shadowColor = '#0a0e14';
      ctx.shadowBlur = 4;
      
      // 画线
      for (let i = 0; i < BOARD_SIZE; i++) {
        const pos = i * CELL_SIZE + OFFSET;
        ctx.beginPath();
        ctx.moveTo(OFFSET, pos);
        ctx.lineTo(canvas.width - OFFSET, pos);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(pos, OFFSET);
        ctx.lineTo(pos, canvas.height - OFFSET);
        ctx.stroke();
      }
      ctx.shadowBlur = 0;

      // 画星位 (天元 + 小目)
      const starPoints = [
        [3, 3], [11, 3], [7, 7], [3, 11], [11, 11]
      ];
      ctx.fillStyle = '#3a4b5a';
      ctx.shadowBlur = 6;
      ctx.shadowColor = '#0f1a24';
      starPoints.forEach(([x, y]) => {
        ctx.beginPath();
        ctx.arc(x * CELL_SIZE + OFFSET, y * CELL_SIZE + OFFSET, 4, 0, 2 * Math.PI);
        ctx.fill();
      });
      ctx.shadowBlur = 0;

      // 3. 绘制棋子 (带立体感阴影+渐变)
      for (let r = 0; r < BOARD_SIZE; r++) {
        for (let c = 0; c < BOARD_SIZE; c++) {
          const stone = board[r][c];
          if (!stone) continue;
          const cx = c * CELL_SIZE + OFFSET;
          const cy = r * CELL_SIZE + OFFSET;
          
          // 外阴影 (立体感)
          ctx.shadowColor = 'rgba(0,0,0,0.7)';
          ctx.shadowBlur = 10;
          ctx.shadowOffsetX = 2;
          ctx.shadowOffsetY = 3;

          // 渐变 (光泽)
          const gradient = ctx.createRadialGradient(
            cx - RADIUS * 0.25, cy - RADIUS * 0.25, RADIUS * 0.2,
            cx, cy, RADIUS * 1.1
          );
          if (stone === 'black') {
            gradient.addColorStop(0, '#4a4f5c');
            gradient.addColorStop(0.5, '#1e2229');
            gradient.addColorStop(1, '#0b0d10');
          } else {
            gradient.addColorStop(0, '#f9fbfd');
            gradient.addColorStop(0.5, '#e6edf5');
            gradient.addColorStop(1, '#b0c2d4');
          }
          ctx.beginPath();
          ctx.arc(cx, cy, RADIUS, 0, 2 * Math.PI);
          ctx.fillStyle = gradient;
          ctx.fill();
          // 高光小点 (更立体)
          ctx.shadowBlur = 4;
          ctx.shadowOffsetX = 0;
          ctx.shadowOffsetY = 0;
          ctx.beginPath();
          ctx.arc(cx - RADIUS*0.2, cy - RADIUS*0.25, RADIUS*0.18, 0, 2*Math.PI);
          ctx.fillStyle = stone === 'black' ? '#68707d' : '#ffffff';
          ctx.globalAlpha = 0.4;
          ctx.fill();
          ctx.globalAlpha = 1.0;
          // 边缘高光
          ctx.shadowBlur = 0;
          ctx.beginPath();
          ctx.arc(cx, cy, RADIUS, 0, 2*Math.PI);
          ctx.strokeStyle = stone === 'black' ? '#2f3540' : '#d7e2ed';
          ctx.lineWidth = 1.2;
          ctx.stroke();
        }
      }
      // 重置阴影
      ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
    }

    // 更新界面文字
    function updateStatus() {
      if (gameOver) return;
      const playerName = currentPlayer === 'black' ? '黑棋' : '白棋';
      const colorClass = currentPlayer === 'black' ? 'black-turn' : 'white-turn';
      turnIndicator.innerHTML = `${currentPlayer === 'black' ? '⚫' : '⚪'} <span class="${colorClass}">${playerName}</span> 落子`;
    }

    // 检查五子连珠 (8方向)
    function checkWin(row, col, player) {
      const directions = [[1,0],[0,1],[1,1],[1,-1]];
      for (const [dx, dy] of directions) {
        let count = 1;
        // 正方向
        for (let step = 1; step < 5; step++) {
          const nr = row + dx * step, nc = col + dy * step;
          if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) break;
          if (board[nr][nc] === player) count++; else break;
        }
        // 反方向
        for (let step = 1; step < 5; step++) {
          const nr = row - dx * step, nc = col - dy * step;
          if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) break;
          if (board[nr][nc] === player) count++; else break;
        }
        if (count >= 5) return true;
      }
      return false;
    }

    // 处理落子
    function handlePlace(row, col) {
      if (gameOver) return false;
      if (row < 0 || row >= BOARD_SIZE || col < 0 || col >= BOARD_SIZE) return false;
      if (board[row][col] !== null) return false;

      // 落子
      board[row][col] = currentPlayer;
      moveHistory.push({ row, col, player: currentPlayer });

      // 绘制更新
      drawBoard();

      // 检查胜利
      if (checkWin(row, col, currentPlayer)) {
        gameOver = true;
        const winner = currentPlayer;
        const icon = winner === 'black' ? '⚫' : '⚪';
        const name = winner === 'black' ? '黑棋' : '白棋';
        winnerIcon.textContent = icon;
        winnerTitle.textContent = `${name} 获胜！`;
        winnerSub.textContent = '五子连珠 · 精彩对局';
        winModal.classList.add('active');
        turnIndicator.innerHTML = `🏆 <span style="color:#eace9f;">${name}胜</span>`;
        return true;
      }

      // 切换玩家
      currentPlayer = currentPlayer === 'black' ? 'white' : 'black';
      updateStatus();
      return true;
    }

    // 悔棋
    function undoMove() {
      if (gameOver) return;
      if (moveHistory.length === 0) return;

      const last = moveHistory.pop();
      board[last.row][last.col] = null;
      // 如果上一步悔棋后，当前玩家应该回退到上一步的玩家
      currentPlayer = last.player;
      drawBoard();
      updateStatus();
    }

    // 重置游戏
    function resetGame() {
      board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(null));
      currentPlayer = 'black';
      gameOver = false;
      moveHistory = [];
      winModal.classList.remove('active');
      drawBoard();
      updateStatus();
    }

    // 点击canvas获取坐标
    function canvasClickHandler(e) {
      if (gameOver) return;
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const mouseX = (e.clientX - rect.left) * scaleX;
      const mouseY = (e.clientY - rect.top) * scaleY;
      const col = Math.round((mouseX - OFFSET) / CELL_SIZE);
      const row = Math.round((mouseY - OFFSET) / CELL_SIZE);
      if (row >= 0 && row < BOARD_SIZE && col >= 0 && col < BOARD_SIZE) {
        handlePlace(row, col);
      }
    }

    // 绑定事件
    canvas.addEventListener('click', canvasClickHandler);
    undoBtn.addEventListener('click', undoMove);
    resetBtn.addEventListener('click', resetGame);
    modalRestartBtn.addEventListener('click', resetGame);
    // 点击模态外部关闭 (但只允许点击按钮关闭)
    // 为了体验，点击背景不关闭

    // 初始化绘制
    resetGame();
  })();
</script>
</body>
</html>
